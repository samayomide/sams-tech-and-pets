<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Accessories - Sams Tech and Pets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f0f4f8; color: #333; }
        
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-2deg); }
            75% { transform: rotate(2deg); }
        }
        
        header { 
            background-color: #0047AB; 
            color: white; 
            padding: 20px; 
            text-align: center;
            animation: slideDown 0.8s ease-out;
        }
        header h1 { animation: wiggle 3s infinite; }
        
        nav { 
            background-color: white; 
            padding: 15px; 
            text-align: center; 
            border-bottom: 2px solid #0047AB;
            animation: slideDown 0.9s ease-out;
        }
        nav a { 
            color: #0047AB; 
            margin: 0 20px; 
            text-decoration: none; 
            font-weight: bold;
            transition: all 0.3s ease;
        }
        nav a:hover { 
            color: white;
            background-color: #0047AB;
            padding: 5px 10px;
            border-radius: 3px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .container h2 { animation: slideUp 0.8s ease-out; }
        
        .product-link { 
            display: block; 
            background: white; 
            border: 2px solid #0047AB;
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 5px; 
            text-decoration: none; 
            color: #0047AB; 
            font-weight: bold;
            animation: slideUp 0.8s ease-out;
            transition: all 0.4s ease;
        }
        .product-link:nth-of-type(1) { animation-delay: 0.1s; }
        .product-link:nth-of-type(2) { animation-delay: 0.2s; }
        
        .product-link:hover { 
            background-color: #0047AB;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 71, 171, 0.3);
        }
        
        footer { 
            background-color: #0047AB; 
            color: white; 
            text-align: center; 
            padding: 20px; 
            margin-top: 30px;
            animation: slideUp 0.8s ease-out 0.5s both;
        }
    </style>
</head>
<body>
    <header>
        <h1>🐾 Pet Accessories</h1>
    </header>
    
    <nav>
        <a href="index.html">Home</a>
        <a href="electronics.html">Electronics</a>
        <a href="pets.html">Pet Accessories</a>
        <a href="contact.html">Contact</a>
    </nav>
    
    <div class="container">
        <h2>Everything for Your Pets</h2>
        <p>Quality pet accessories at great prices!</p>
        
        <a href="https://s.click.aliexpress.com/e/_EISCgt2" class="product-link">🐕 Pet Product 1 - Click to View</a>
        <a href="https://s.click.aliexpress.com/e/_EzeZ10c" class="product-link">🐱 Pet Product 2 - Click to View</a>
    </div>
    
    <footer>
        <p>&copy; 2026 Sams Tech and Pets. All rights reserved.</p>
    </footer>
</body>
</html>
